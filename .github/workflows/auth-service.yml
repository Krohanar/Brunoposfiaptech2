name: Auth Service CI-CD

on:
  push:
    branches: [ "main" ]
    paths:
      - "auth-service/**"
      - ".github/workflows/auth-service.yml"
  workflow_dispatch:

permissions:
  id-token: write
  contents: read

env:
  AWS_REGION: ${{ secrets.AWS_REGION }}
  ECR_REPOSITORY: ${{ vars.AUTH_ECR_REPOSITORY }}
  SERVICE_PATH: auth-service

jobs:
  build-and-push:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set short SHA
        id: vars
        shell: bash
        run: echo "short_sha=${GITHUB_SHA::7}" >> "$GITHUB_OUTPUT"

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.22"

      - name: Download Go dependencies
        working-directory: ${{ env.SERVICE_PATH }}
        run: go mod tidy

      - name: Run Go tests
        working-directory: ${{ env.SERVICE_PATH }}
        run: go test ./...

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build Docker image
        run: |
          docker build \
            -t $ECR_REPOSITORY:${{ steps.vars.outputs.short_sha }} \
            -f $SERVICE_PATH/Dockerfile \
            $SERVICE_PATH

      - name: Run Trivy image scan
        uses: aquasecurity/trivy-action@0.33.1
        with:
          image-ref: ${{ env.ECR_REPOSITORY }}:${{ steps.vars.outputs.short_sha }}
          format: table
          exit-code: 1
          ignore-unfixed: true
          vuln-type: os,library
          severity: CRITICAL

      - name: Tag Docker image
        run: |
          docker tag \
            $ECR_REPOSITORY:${{ steps.vars.outputs.short_sha }} \
            ${{ steps.login-ecr.outputs.registry }}/$ECR_REPOSITORY:${{ steps.vars.outputs.short_sha }}

      - name: Push Docker image
        run: |
          docker push \
            ${{ steps.login-ecr.outputs.registry }}/$ECR_REPOSITORY:${{ steps.vars.outputs.short_sha }}

  update-gitops:
    needs: build-and-push
    runs-on: ubuntu-latest

    steps:
      - name: Checkout GitOps repository
        uses: actions/checkout@v4
        with:
          repository: ${{ vars.GITOPS_REPOSITORY }}
          token: ${{ secrets.GITOPS_REPO_TOKEN }}
          path: gitops

      - name: Update auth-service image tag
        run: |
          sed -i "s|image: .*togglemaster/dev/auth-service:.*|image: 106978078844.dkr.ecr.us-east-1.amazonaws.com/togglemaster/dev/auth-service:${GITHUB_SHA::7}|g" \
            gitops/apps/auth-service/deployment.yaml

      - name: Commit and push changes
        run: |
          cd gitops
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"
          git add apps/auth-service/deployment.yaml
          git commit -m "Update auth-service image to ${GITHUB_SHA::7}" || echo "No changes to commit"
          git push