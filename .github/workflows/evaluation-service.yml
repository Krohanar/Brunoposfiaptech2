name: Evaluation Service CI-CD

on:
  push:
    branches: [ "main" ]
    paths:
      - "evaluation-service/**"
      - ".github/workflows/evaluation-service.yml"
  pull_request:
    branches: [ "main" ]
    paths:
      - "evaluation-service/**"
      - ".github/workflows/evaluation-service.yml"
  workflow_dispatch:

permissions:
  id-token: write
  contents: read

env:
  AWS_REGION: ${{ secrets.AWS_REGION }}
  ECR_REPOSITORY: ${{ vars.EVALUATION_ECR_REPOSITORY }}
  SERVICE_PATH: evaluation-service
  GITOPS_REPOSITORY: ${{ vars.GITOPS_REPOSITORY }}

jobs:
  lint:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.25"

      - name: Download Go dependencies
        working-directory: ${{ env.SERVICE_PATH }}
        run: |
          go mod tidy
          go mod download

      - name: Run golangci-lint
        uses: golangci/golangci-lint-action@v6
        with:
          version: v1.64.8
          working-directory: ${{ env.SERVICE_PATH }}

  sast:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.25"

      - name: Download Go dependencies
        working-directory: ${{ env.SERVICE_PATH }}
        run: |
          go mod tidy
          go mod download

      - name: Run gosec
        working-directory: ${{ env.SERVICE_PATH }}
        run: |
          go install github.com/securego/gosec/v2/cmd/gosec@latest
          gosec -severity=high -confidence=high ./...

  build-and-push:
    needs:
      - lint
      - sast
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set short SHA
        id: vars
        shell: bash
        run: echo "short_sha=${GITHUB_SHA::7}" >> "$GITHUB_OUTPUT"

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.25"

      - name: Download Go dependencies
        working-directory: ${{ env.SERVICE_PATH }}
        run: |
          go mod tidy
          go mod download

      - name: Run Go tests
        working-directory: ${{ env.SERVICE_PATH }}
        run: go test ./...

      - name: Configure AWS credentials
        if: github.event_name == 'push'
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to Amazon ECR
        if: github.event_name == 'push'
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Run Trivy filesystem scan
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: fs
          scan-ref: ${{ env.SERVICE_PATH }}
          format: table
          exit-code: 1
          ignore-unfixed: true
          severity: CRITICAL

      - name: Build Docker image
        run: |
          docker build \
            -t $ECR_REPOSITORY:${{ steps.vars.outputs.short_sha }} \
            -f $SERVICE_PATH/Dockerfile \
            $SERVICE_PATH

      - name: Run Trivy image scan
        if: github.event_name == 'push'
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: ${{ env.ECR_REPOSITORY }}:${{ steps.vars.outputs.short_sha }}
          format: table
          exit-code: 1
          ignore-unfixed: true
          vuln-type: os,library
          severity: CRITICAL

      - name: Tag Docker image
        if: github.event_name == 'push'
        run: |
          docker tag \
            $ECR_REPOSITORY:${{ steps.vars.outputs.short_sha }} \
            ${{ steps.login-ecr.outputs.registry }}/$ECR_REPOSITORY:${{ steps.vars.outputs.short_sha }}

      - name: Push Docker image
        if: github.event_name == 'push'
        run: |
          docker push \
            ${{ steps.login-ecr.outputs.registry }}/$ECR_REPOSITORY:${{ steps.vars.outputs.short_sha }}

  update-gitops:
    if: github.event_name == 'push'
    needs: build-and-push
    runs-on: ubuntu-latest

    steps:
      - name: Checkout GitOps repository
        uses: actions/checkout@v4
        with:
          repository: ${{ env.GITOPS_REPOSITORY }}
          token: ${{ secrets.GITOPS_REPO_TOKEN }}
          path: gitops

      - name: Update evaluation-service image tag
        shell: bash
        run: |
          sed -i "s|image: .*togglemaster/dev/evaluation-service:.*|image: 106978078844.dkr.ecr.us-east-1.amazonaws.com/togglemaster/dev/evaluation-service:${GITHUB_SHA::7}|g" \
            gitops/apps/evaluation-service/deployment.yaml

      - name: Commit and push changes
        shell: bash
        run: |
          cd gitops
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"
          git add apps/evaluation-service/deployment.yaml
          git commit -m "Update evaluation-service image to ${GITHUB_SHA::7}" || echo "No changes to commit"
          git push