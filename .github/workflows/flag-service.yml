name: Flag Service CI-CD

on:
  push:
    branches: [ "main" ]
    paths:
      - "flag-service/**"
      - ".github/workflows/flag-service.yml"
  pull_request:
    branches: [ "main" ]
    paths:
      - "flag-service/**"
      - ".github/workflows/flag-service.yml"
  workflow_dispatch:

permissions:
  id-token: write
  contents: read

env:
  AWS_REGION: ${{ secrets.AWS_REGION }}
  ECR_REPOSITORY: ${{ vars.FLAG_ECR_REPOSITORY }}
  SERVICE_PATH: flag-service
  GITOPS_REPOSITORY: ${{ vars.GITOPS_REPOSITORY }}

jobs:
  lint:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        working-directory: ${{ env.SERVICE_PATH }}
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install flake8

      - name: Run flake8
        working-directory: ${{ env.SERVICE_PATH }}
        run: |
          flake8 .

  sast:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        working-directory: ${{ env.SERVICE_PATH }}
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install bandit

      - name: Run bandit
        working-directory: ${{ env.SERVICE_PATH }}
        run: |
          bandit -r . -ll

  build-and-push:
    needs:
      - lint
      - sast
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set short SHA
        id: vars
        shell: bash
        run: echo "short_sha=${GITHUB_SHA::7}" >> "$GITHUB_OUTPUT"

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        working-directory: ${{ env.SERVICE_PATH }}
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Basic validation
        working-directory: ${{ env.SERVICE_PATH }}
        run: |
          python -m py_compile app.py

      - name: Configure AWS credentials
        if: github.event_name == 'push'
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to Amazon ECR
        if: github.event_name == 'push'
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build Docker image
        run: |
          docker build \
            -t $ECR_REPOSITORY:${{ steps.vars.outputs.short_sha }} \
            -f $SERVICE_PATH/Dockerfile \
            $SERVICE_PATH

      - name: Run Trivy image scan
        if: github.event_name == 'push'
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: ${{ env.ECR_REPOSITORY }}:${{ steps.vars.outputs.short_sha }}
          format: table
          exit-code: 1
          ignore-unfixed: true
          vuln-type: os,library
          severity: CRITICAL

      - name: Tag Docker image
        if: github.event_name == 'push'
        run: |
          docker tag \
            $ECR_REPOSITORY:${{ steps.vars.outputs.short_sha }} \
            ${{ steps.login-ecr.outputs.registry }}/$ECR_REPOSITORY:${{ steps.vars.outputs.short_sha }}

      - name: Push Docker image
        if: github.event_name == 'push'
        run: |
          docker push \
            ${{ steps.login-ecr.outputs.registry }}/$ECR_REPOSITORY:${{ steps.vars.outputs.short_sha }}

  update-gitops:
    if: github.event_name == 'push'
    needs: build-and-push
    runs-on: ubuntu-latest

    steps:
      - name: Checkout GitOps repository
        uses: actions/checkout@v4
        with:
          repository: ${{ env.GITOPS_REPOSITORY }}
          token: ${{ secrets.GITOPS_REPO_TOKEN }}
          path: gitops

      - name: Update flag-service image tag
        shell: bash
        run: |
          sed -i "s|image: .*togglemaster/dev/flag-service:.*|image: 106978078844.dkr.ecr.us-east-1.amazonaws.com/togglemaster/dev/flag-service:${GITHUB_SHA::7}|g" \
            gitops/apps/flag-service/deployment.yaml

      - name: Commit and push changes
        shell: bash
        run: |
          cd gitops
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"
          git add apps/flag-service/deployment.yaml
          git commit -m "Update flag-service image to ${GITHUB_SHA::7}" || echo "No changes to commit"
          git push