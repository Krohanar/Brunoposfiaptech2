name: Targeting Service CI-CD

on:
  push:
    branches: [ "main" ]
    paths:
      - "targeting-service/**"
      - ".github/workflows/targeting-service.yml"
  workflow_dispatch:

permissions:
  id-token: write
  contents: read

env:
  AWS_REGION: ${{ secrets.AWS_REGION }}
  ECR_REPOSITORY: ${{ vars.TARGETING_ECR_REPOSITORY }}
  SERVICE_PATH: targeting-service

jobs:
  build-and-push:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set short SHA
        id: vars
        run: echo "short_sha=${GITHUB_SHA::7}" >> $GITHUB_OUTPUT

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        working-directory: ${{ env.SERVICE_PATH }}
        run: |
          pip install --upgrade pip
          pip install -r requirements.txt

      - name: Basic validation
        working-directory: ${{ env.SERVICE_PATH }}
        run: |
          python -m py_compile app.py

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build Docker image
        run: |
          docker build \
            -t $ECR_REPOSITORY:${{ steps.vars.outputs.short_sha }} \
            -f $SERVICE_PATH/Dockerfile \
            $SERVICE_PATH

      - name: Tag Docker image
        run: |
          docker tag \
            $ECR_REPOSITORY:${{ steps.vars.outputs.short_sha }} \
            ${{ steps.login-ecr.outputs.registry }}/$ECR_REPOSITORY:${{ steps.vars.outputs.short_sha }}

      - name: Push Docker image
        run: |
          docker push \
            ${{ steps.login-ecr.outputs.registry }}/$ECR_REPOSITORY:${{ steps.vars.outputs.short_sha }}